<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALZAK STORE - تعديل منتج</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark d-lg-none py-3">...</nav>
    <div class="offcanvas offcanvas-start d-lg-none" id="sidebarOffcanvas">...</div>
    <div class="wrapper">
        <nav class="sidebar d-none d-lg-block">
            <div class="nav flex-column">
                <a href="index.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> الرئيسية</a>
                <div class="section-title">المنتجات والفئات</div>
                <a href="categories.html" class="nav-link"><i class="fas fa-tags"></i> الفئات</a>
                <a href="add-product.html" class="nav-link"><i class="fas fa-plus-circle"></i> إضافة منتج</a>
                <a href="manage-products.html" class="nav-link active"><i class="fas fa-boxes"></i> إدارة المنتجات</a>
                <a href="stock.html" class="nav-link"><i class="fas fa-archive"></i> المخزون</a>
                <!-- باقي الروابط -->
            </div>
        </nav>
        <main class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4 py-3 px-4 rounded-4">
                <h2 class="gold-text fs-3 mb-0"><i class="fas fa-edit ms-2"></i> تعديل المنتج</h2>
                <div>...</div>
            </div>
            <div class="stat-card">
                <form id="editProductForm">
                    <input type="hidden" name="id" id="editProductId">
                    <div class="mb-3">
                        <label class="form-label">اسم المنتج</label>
                        <input type="text" class="form-control" name="name" id="editProductName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">الفئة</label>
                        <select class="form-select" name="category" id="editProductCategory" required>
                            <option value="">اختر الفئة</option>
                            <option value="اشتراكات">اشتراكات</option>
                            <option value="رصيد">رصيد</option>
                            <option value="خدمات">خدمات</option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col mb-3">
                            <label class="form-label">السعر ($)</label>
                            <input type="number" step="0.01" class="form-control" name="price" id="editProductPrice" required>
                        </div>
                        <div class="col mb-3">
                            <label class="form-label">التكلفة ($)</label>
                            <input type="number" step="0.01" class="form-control" name="cost" id="editProductCost" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">المورد</label>
                        <select class="form-select" name="supplier_id" id="editProductSupplier">
                            <option value="">اختر المورد</option>
                            <option value="supp1">مورد 1</option>
                            <option value="supp2">مورد 2</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">الكمية المتاحة</label>
                        <input type="number" class="form-control" name="stock" id="editProductStock" value="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">الحالة</label>
                        <select class="form-select" name="status" id="editProductStatus">
                            <option value="active">نشط</option>
                            <option value="inactive">غير نشط</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">رابط الصورة</label>
                        <input type="url" class="form-control" name="image_url" id="editProductImage" placeholder="https://example.com/product.jpg">
                    </div>
                    <div class="row">
                        <div class="col mb-3">
                            <label class="form-label">عرض الصورة (بكسل)</label>
                            <input type="number" class="form-control" name="image_width" id="editProductImageWidth" value="300">
                        </div>
                        <div class="col mb-3">
                            <label class="form-label">ارتفاع الصورة (بكسل)</label>
                            <input type="number" class="form-control" name="image_height" id="editProductImageHeight" value="300">
                        </div>
                    </div>
                    <button type="button" class="btn btn-gold" onclick="updateProduct()">تحديث المنتج</button>
                    <a href="manage-products.html" class="btn btn-outline-gold">إلغاء</a>
                </form>
            </div>
        </main>
    </div>
    <script src="..."></script>
</body>
</html>
