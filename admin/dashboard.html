<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALZAK STORE Admin</title>

<link rel="stylesheet" href="css/admin.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- CHART SYSTEM -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="admin-container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
<i class="fa-solid fa-crown"></i>
<span>ALZAK ADMIN</span>
</div>

<ul class="menu">

<li onclick="openSection('dashboard')">
<i class="fa-solid fa-chart-line"></i>
<span>لوحة القيادة</span>
</li>

<li onclick="openSection('products')">
<i class="fa-solid fa-box"></i>
<span>المنتجات</span>
</li>

<li onclick="openSection('categories')">
<i class="fa-solid fa-layer-group"></i>
<span>الأقسام</span>
</li>

<li onclick="openSection('orders')">
<i class="fa-solid fa-cart-shopping"></i>
<span>الطلبات</span>
</li>

<li onclick="openSection('users')">
<i class="fa-solid fa-users"></i>
<span>المستخدمين</span>
</li>

<li onclick="openSection('payments')">
<i class="fa-solid fa-credit-card"></i>
<span>طرق الدفع</span>
</li>

<li onclick="openSection('settings')">
<i class="fa-solid fa-gear"></i>
<span>الإعدادات</span>
</li>

</ul>

</div>


<!-- MAIN AREA -->

<div class="main">

<div class="topbar">

<div class="title">
لوحة التحكم
</div>

<div class="admin-info">
<i class="fa-solid fa-user"></i>
<span>Admin</span>
</div>

</div>


<div class="content" id="contentArea">

<h2>مرحباً بك في لوحة تحكم ALZAK STORE</h2>

<p>
من هنا يمكنك إدارة:
المنتجات – الطلبات – المستخدمين – طرق الدفع
</p>

</div>

</div>

</div>



<!-- MODAL -->

<div id="modal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<div id="modalBody"></div>

</div>

</div>



<!-- SCRIPTS -->

<script src="../shared/airtable-config.js"></script>
<script src="../shared/airtable-service.js"></script>
<script src="../shared/helpers.js"></script>

<script src="js/ui.js"></script>
<script src="js/dashboard.js"></script>


<script>

document.addEventListener("DOMContentLoaded",function(){

if(typeof openSection === "function"){
openSection("dashboard");
}

});

</script>

</body>

</html>
