<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>...</head>
<body>
    <!-- القوائم الجانبية -->
    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4 py-3 px-4 rounded-4">
            <h2 class="gold-text fs-3 mb-0"><i class="fas fa-plus-circle ms-2"></i> إضافة منتج جديد</h2>
            <div>...</div>
        </div>
        <div class="stat-card">
            <form id="addProductForm">
                <div class="mb-3">
                    <label class="form-label">اسم المنتج</label>
                    <input type="text" class="form-control" name="name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">الفئة</label>
                    <select class="form-select" name="category" required>
                        <option value="">اختر الفئة</option>
                        <option value="اشتراكات">اشتراكات</option>
                        <option value="رصيد">رصيد</option>
                        <option value="خدمات">خدمات</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col mb-3">
                        <label class="form-label">السعر ($)</label>
                        <input type="number" step="0.01" class="form-control" name="price" required>
                    </div>
                    <div class="col mb-3">
                        <label class="form-label">التكلفة ($)</label>
                        <input type="number" step="0.01" class="form-control" name="cost" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">المورد</label>
                    <select class="form-select" name="supplier_id">
                        <option value="">اختر المورد</option>
                        <option value="supp1">مورد 1</option>
                        <option value="supp2">مورد 2</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">الكمية المتاحة</label>
                    <input type="number" class="form-control" name="stock" value="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">الحالة</label>
                    <select class="form-select" name="status">
                        <option value="active">نشط</option>
                        <option value="inactive">غير نشط</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">رابط الصورة</label>
                    <input type="url" class="form-control" name="image_url" placeholder="https://example.com/product.jpg">
                </div>
                <button type="button" class="btn btn-gold" onclick="addProduct()">حفظ المنتج</button>
                <a href="manage-products.html" class="btn btn-outline-gold me-2">إلغاء</a>
            </form>
        </div>
    </main>
</body>
</html>
