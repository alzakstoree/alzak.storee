    <div class="offcanvas offcanvas-start d-lg-none" id="sidebarOffcanvas">...</div>
    <div class="wrapper">
        <nav class="sidebar d-none d-lg-block">
            <div class="nav flex-column">
                <div class="section-title">الموردين و API</div>
                <a href="suppliers.html" class="nav-link"><i class="fas fa-truck"></i> إدارة الموردين</a>
                <a href="add-supplier.html" class="nav-link active"><i class="fas fa-plus-circle"></i> إضافة مورد</a>
                <a href="import-products.html" class="nav-link"><i class="fas fa-file-import"></i> استيراد منتجات</a>
                <a href="api-clients.html" class="nav-link"><i class="fas fa-code"></i> عملاء API</a>
            </div>
        </nav>
        <main class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4 py-3 px-4 rounded-4">
                <h2 class="gold-text fs-3 mb-0"><i class="fas fa-plus-circle ms-2"></i> إضافة مورد جديد</h2>
                <div>...</div>
            </div>
            <div class="stat-card">
                <form id="addSupplierForm">
                    <div class="mb-3">
                        <label class="form-label">اسم المورد</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">رابط API</label>
                        <input type="url" class="form-control" name="api_url">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">مفتاح API</label>
                        <input type="text" class="form-control" name="api_key">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">المفتاح السري</label>
                        <input type="text" class="form-control" name="api_secret">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">شعار المورد</label>
                        <input type="url" class="form-control" name="logo_url" placeholder="https://example.com/logo.png">
                    </div>
                    <div class="row">
                        <div class="col mb-3">
                            <label class="form-label">عرض الشعار (بكسل)</label>
                            <input type="number" class="form-control" name="logo_width" value="50">
                        </div>
                        <div class="col mb-3">
                            <label class="form-label">ارتفاع الشعار (بكسل)</label>
                            <input type="number" class="form-control" name="logo_height" value="50">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">الحالة</label>
                        <select class="form-select" name="status">
                            <option value="active">نشط</option>
                            <option value="inactive">غير نشط</option>
                        </select>
                    </div>
                    <button type="button" class="btn btn-gold" onclick="addSupplier()">حفظ</button>
                    <a href="suppliers.html" class="btn btn-outline-gold">إلغاء</a>
                </form>
            </div>
