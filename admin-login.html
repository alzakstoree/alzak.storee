<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALZAK STORE - تسجيل دخول الإدمن</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark d-lg-none py-3">...</nav>
    <div class="offcanvas offcanvas-start d-lg-none" id="sidebarOffcanvas">...</div>
    <div class="wrapper">
        <nav class="sidebar d-none d-lg-block">
            <!-- نفس القائمة الجانبية مع تعديل الـ active -->
            <div class="text-center mb-4">
                <h3 class="gold-text fs-2">ALZAK STORE</h3>
                <p class="text-muted small">لوحة الإدارة</p>
            </div>
            <div class="nav flex-column">
                <a href="index.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> الرئيسية</a>
                <!-- باقي الروابط كما هي ... -->
            </div>
        </nav>
        <main class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4 py-3 px-4 rounded-4" style="background: rgba(20,22,27,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,215,0,0.2);">
                <h2 class="gold-text fs-3 mb-0"><i class="fas fa-user-lock ms-2"></i> تسجيل دخول الإدمن</h2>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-muted">حالة API:</span>
                    <span class="badge" id="apiStatus">غير مهيأ</span>
                    <a href="api-config.html" class="btn btn-outline-gold btn-sm px-4"><i class="fas fa-key me-1"></i> إعدادات API</a>
                </div>
            </div>
            <div class="stat-card" style="max-width: 500px; margin: auto;">
                <form id="adminLoginForm">
                    <div class="mb-3">
                        <label class="form-label">اسم المستخدم</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">كلمة المرور</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <button type="button" class="btn btn-gold w-100" onclick="adminLogin()">دخول</button>
                </form>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
