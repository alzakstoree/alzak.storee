<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALZAK STORE - إعدادات API</title>
    <!-- Bootstrap 5.3 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- ملف التنسيقات -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* تأكيد إضافي: لا شيء يمنع التفاعل مع الحقول */
        #apiKeyInput, #baseIdInput {
            pointer-events: auto !important;
            opacity: 1 !important;
            z-index: 9999 !important;
            position: relative !important;
        }
        .stat-card {
            overflow: visible !important;
        }
    </style>
</head>
<body>
    <!-- شريط التنقل للجوال (مبسط) -->
    <nav class="navbar navbar-dark d-lg-none py-3" style="background: rgba(0,0,0,0.95); border-bottom: 1px solid rgba(255,215,0,0.2);">
        <div class="container-fluid">
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
                <i class="fas fa-bars fa-2x" style="color: #ffd700;"></i>
            </button>
            <span class="navbar-brand gold-text fs-4" style="font-weight: 700;">ALZAK STORE</span>
        </div>
    </nav>

    <!-- القائمة الجانبية للجوال (مختصرة) -->
    <div class="offcanvas offcanvas-start d-lg-none" tabindex="-1" id="sidebarOffcanvas" style="background: rgba(8,10,15,0.98); width: 300px;">
        <div class="offcanvas-header border-bottom" style="border-color: rgba(255,215,0,0.2);">
            <h5 class="offcanvas-title gold-text fs-3">ALZAK STORE</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0">
            <div class="nav flex-column">
                <a href="index.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> الرئيسية</a>
                <!-- روابط أساسية فقط -->
            </div>
        </div>
    </div>

    <!-- الحاوية الرئيسية -->
    <div class="wrapper">
        <!-- القائمة الجانبية للشاشات الكبيرة (مبسطة) -->
        <nav class="sidebar d-none d-lg-block" style="height: 100vh; overflow-y: auto;">
            <div class="text-center mb-4">
                <h3 class="gold-text fs-2">ALZAK STORE</h3>
                <p class="text-muted small">لوحة الإدارة</p>
            </div>
            <div class="nav flex-column">
                <a href="index.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> الرئيسية</a>
                <div class="section-title">الإعدادات</div>
                <a href="api-config.html" class="nav-link active"><i class="fas fa-key"></i> إعدادات API</a>
            </div>
        </nav>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            <!-- البار العلوي -->
            <div class="d-flex justify-content-between align-items-center mb-4 py-3 px-4 rounded-4" style="background: rgba(20,22,27,0.7); border: 1px solid rgba(255,215,0,0.2);">
                <h2 class="gold-text fs-3 mb-0"><i class="fas fa-key ms-2"></i> إعدادات Airtable</h2>
                <div class="d-flex align-items-center gap-3">
                    <a href="admin-login.html" class="btn btn-outline-gold btn-sm px-3"><i class="fas fa-user me-1"></i></a>
                    <span class="text-muted">حالة API:</span>
                    <span class="badge bg-warning text-dark px-3 py-2" id="apiStatus" style="background: rgba(255,215,0,0.2); color: #ffd700; border: 1px solid #ffd700;">غير مهيأ</span>
                </div>
            </div>

            <!-- نموذج إعدادات API -->
            <div class="stat-card" style="max-width: 600px; margin: auto; overflow: visible;">
                <form id="apiConfigForm">
                    <div class="mb-3">
                        <label class="form-label">API Key (Personal Access Token)</label>
                        <input type="text" class="form-control" id="apiKeyInput" value="" placeholder="أدخل المفتاح" autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Base ID</label>
                        <input type="text" class="form-control" id="baseIdInput" value="" placeholder="أدخل معرف القاعدة" autocomplete="off">
                    </div>
                    <button type="button" class="btn btn-gold" onclick="saveApiConfig()">حفظ الإعدادات</button>
                </form>
            </div>
        </main>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- ملف الجافاسكريبت -->
    <script src="assets/js/script.js"></script>
</body>
</html>
