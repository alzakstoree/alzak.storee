<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>...</head>
<body>
    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4 py-3 px-4 rounded-4">
            <h2 class="gold-text fs-3 mb-0"><i class="fas fa-plus-circle ms-2"></i> إضافة طريقة دفع</h2>
            <div>...</div>
        </div>
        <div class="stat-card">
            <form id="addPaymentMethodForm">
                <div class="mb-3">
                    <label class="form-label">اسم الطريقة</label>
                    <input type="text" class="form-control" name="method" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">الحالة</label>
                    <select class="form-select" name="status">
                        <option value="active">نشط</option>
                        <option value="inactive">غير نشط</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col mb-3">
                        <label class="form-label">الحد الأدنى ($)</label>
                        <input type="number" step="0.01" class="form-control" name="min_amount" value="0">
                    </div>
                    <div class="col mb-3">
                        <label class="form-label">الحد الأقصى ($)</label>
                        <input type="number" step="0.01" class="form-control" name="max_amount" value="0">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">رابط صورة الأيقونة</label>
                    <input type="url" class="form-control" name="icon_url" placeholder="https://example.com/icon.png">
                </div>
                <div class="mb-3">
                    <label class="form-label">تعليمات الدفع</label>
                    <textarea class="form-control" name="instructions" rows="2"></textarea>
                </div>
                <button type="button" class="btn btn-gold" onclick="addPaymentMethod()">حفظ</button>
                <a href="payment-methods.html" class="btn btn-outline-gold">إلغاء</a>
            </form>
        </div>
    </main>
</body>
</html>
